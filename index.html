const app = document.getElementById("app");

brands.forEach(b => {
  const block = document.createElement("div");
  block.className = "brand-block";

  const header = document.createElement("div");
  header.className = "brand-header";

  if (logos[b.logo]) {
    const img = document.createElement("img");
    img.src = logos[b.logo];
    img.className = "brand-logo";
    header.appendChild(img);
  }

  const info = document.createElement("div");
  info.className = "brand-info";
  info.innerHTML = '<div class="brand-name">' + b.name + '</div><div class="brand-count">不適用 ' + b.stores.length + ' 個店點</div>';
  header.appendChild(info);
  block.appendChild(header);

  const list = document.createElement("div");
  list.className = "list";
  b.stores.forEach(s => {
    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML = '<div class="item-name">' + s.store + '</div><div class="item-addr">' + s.address + '</div><span class="tag-city">' + s.city + '</span>';
    list.appendChild(item);
  });
  block.appendChild(list);
  app.appendChild(block);
